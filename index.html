<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤青チャレンジ（指数確率版）</title>
<style>
body{font-family:sans-serif;text-align:center;background:#222;color:white;}
button{font-size:20px;padding:15px 30px;margin:10px;border:none;border-radius:10px;cursor:pointer;}
#red{background:red;color:white;}
#blue{background:blue;color:white;}
#result{font-size:32px;margin-top:20px;height:50px;}
#info{margin-top:10px;font-size:18px;}
#prob{margin-top:10px;font-size:20px;color:yellow;}
</style>
</head>
<body>
<h1>赤青チャレンジ</h1>
<p>確率はどんどん1/2^nに！30連続当たりを目指せ</p>

<button id="red" onclick="choose('red')">赤</button>
<button id="blue" onclick="choose('blue')">青</button>

<div id="result"></div>
<div id="info"></div>
<div id="prob"></div>

<script>
let streak=0;

function getProbability(){
return Math.pow(1/2, streak+1);
}

function updateProbDisplay(){
const prob=getProbability();
document.getElementById("prob").textContent="現在の当たり確率：1/"+(1/prob);
}

function choose(choice){
const prob=getProbability();
const win=Math.random()<prob;

// 必ずどちらかが正解になるように設定
let correct;
if(win){
  correct = choice; // 当たりのときは選んだ方が正解
}else{
  correct = (choice === 'red') ? 'blue' : 'red';
}

const result=document.getElementById("result");
const info=document.getElementById("info");

if(choice === correct){
  streak++;
  result.textContent="当たり！";
  result.style.color="lime";

  if(streak>=30){
    result.textContent="🎉クリア！！🎉";
    info.textContent="30連続成功！";
    streak=0;
    updateProbDisplay();
    return;
  }
}else{
  result.textContent="ハズレ！！（正解は"+ (correct==='red'?'赤':'青') +"）";
  result.style.color="red";
  info.textContent="連続記録リセット…";

  document.body.style.background="#550000";
  setTimeout(()=>document.body.style.background="#222",200);

  streak=0;
  updateProbDisplay();
  return;
}

info.textContent="現在: "+streak+"連勝";
updateProbDisplay();
}

updateProbDisplay();
</script>
</body>
</html>
